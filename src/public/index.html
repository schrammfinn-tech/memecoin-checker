<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DECIPHER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#020212;
  --card:rgba(12,12,28,0.86);
  --border:rgba(0,240,255,0.08);
  --text:#dde0f0;
  --muted:#6a6e8a;
  --green:#00ff88;
  --red:#ff3366;
  --yellow:#ffcc00;
  --blue:#4dabff;
  --purple:#c470ff;
  --cyan:#00e5ff;
  --magenta:#ff26b3;
  --orange:#ff7a3d;
  --glow-cyan:rgba(0,229,255,0.25);
  --glow-magenta:rgba(255,38,179,0.2);
  --glow-green:rgba(0,255,136,0.2);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Orbitron','Inter','Segoe UI',system-ui,sans-serif;
  min-height:100vh;
  background-image:
    linear-gradient(rgba(0,229,255,0.018) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,0.018) 1px,transparent 1px),
    radial-gradient(ellipse at 30% 15%,rgba(0,229,255,0.06) 0%,transparent 55%),
    radial-gradient(ellipse at 70% 80%,rgba(255,38,179,0.04) 0%,transparent 55%),
    radial-gradient(ellipse at 50% 50%,rgba(0,255,136,0.03) 0%,transparent 70%);
  background-size:48px 48px,48px 48px,100% 100%,100% 100%,100% 100%;
}

::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.15);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,229,255,0.35)}

@keyframes borderGlow{
  0%,100%{border-color:rgba(0,229,255,0.12);box-shadow:0 0 8px rgba(0,229,255,0.04),inset 0 0 8px rgba(0,229,255,0.02)}
  50%{border-color:rgba(0,229,255,0.3);box-shadow:0 0 18px rgba(0,229,255,0.08),inset 0 0 12px rgba(0,229,255,0.04)}
}
@keyframes pulse{
  0%,100%{opacity:0.4}
  50%{opacity:1}
}
@keyframes flicker{
  0%,100%{opacity:1}
  92%{opacity:1}
  93%{opacity:0.85}
  94%{opacity:1}
  96%{opacity:0.9}
  97%{opacity:1}
}

.top{
  background:rgba(8,8,24,0.92);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border-bottom:2px solid rgba(0,229,255,0.12);
  padding:14px 28px;
  display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:100;
  box-shadow:0 1px 30px rgba(0,229,255,0.06);
}
.top h1{
  font-size:17px;font-weight:900;color:var(--cyan);white-space:nowrap;
  text-shadow:0 0 20px rgba(0,229,255,0.3),0 0 40px rgba(0,229,255,0.1);
  letter-spacing:2px;
}
.top input{
  flex:1;max-width:460px;
  background:rgba(255,255,255,0.03);
  color:var(--text);
  border:1px solid rgba(0,229,255,0.12);
  padding:10px 14px;font-size:13px;border-radius:8px;
  outline:none;font-family:inherit;
  transition:all 0.3s;
  letter-spacing:0.5px;
}
.top input:focus{
  border-color:var(--cyan);
  box-shadow:0 0 16px var(--glow-cyan),0 0 30px rgba(0,229,255,0.08);
}
.top button{
  color:#020212;border:none;padding:10px 20px;font-size:12px;font-weight:700;
  border-radius:8px;cursor:pointer;font-family:inherit;
  transition:all 0.3s;white-space:nowrap;letter-spacing:0.5px;
}
.btn-cyan{
  background:linear-gradient(135deg,var(--cyan),#0099ff);
  box-shadow:0 0 12px rgba(0,229,255,0.3);
}
.btn-cyan:hover{
  box-shadow:0 0 22px rgba(0,229,255,0.5),0 0 44px rgba(0,229,255,0.15);
  transform:translateY(-1px);
}
.btn-cyan:disabled{opacity:0.3;cursor:not-allowed;transform:none;box-shadow:none}
.btn-sm{
  background:rgba(0,229,255,0.06);
  color:var(--cyan);
  border:1px solid rgba(0,229,255,0.25);
  font-weight:600;
}
.btn-sm:hover{
  background:rgba(0,229,255,0.12);
  border-color:var(--cyan);
  box-shadow:0 0 10px rgba(0,229,255,0.2);
}

.content{padding:20px 28px 50px;max-width:100%;margin:0 auto}
.content.empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:55vh;text-align:center;
}
.content.empty h2{
  font-size:28px;font-weight:900;color:var(--cyan);margin-bottom:8px;
  text-shadow:0 0 30px rgba(0,229,255,0.4),0 0 60px rgba(0,229,255,0.1);
  letter-spacing:3px;
}
.content.empty p{
  color:var(--muted);font-size:14px;max-width:440px;line-height:1.6;
  letter-spacing:0.3px;
}
.content.empty .hero-search{display:flex;gap:10px;margin-top:28px;align-items:center;justify-content:center}
.content.empty .hero-search input{
  width:420px;max-width:70vw;
  background:rgba(255,255,255,0.03);
  color:var(--text);
  border:1px solid rgba(0,229,255,0.15);
  padding:14px 18px;font-size:14px;border-radius:10px;
  outline:none;
  font-family:'SF Mono','JetBrains Mono',monospace;
  transition:all 0.3s;
}
.content.empty .hero-search input:focus{
  border-color:var(--cyan);
  box-shadow:0 0 20px var(--glow-cyan),0 0 40px rgba(0,229,255,0.06);
}
.content.empty .hero-search button{padding:14px 28px;font-size:14px}

.recent-section{margin-top:32px;max-width:500px;width:100%}
.recent-section h3{
  font-size:10px;text-transform:uppercase;letter-spacing:2.5px;
  color:var(--muted);margin-bottom:10px;text-align:center;
}
.recent-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.recent-item{
  background:rgba(0,229,255,0.03);
  border:1px solid rgba(0,229,255,0.08);
  border-radius:8px;padding:8px 14px;
  cursor:pointer;transition:all 0.3s;
  text-align:center;min-width:100px;
}
.recent-item:hover{
  border-color:var(--cyan);
  background:rgba(0,229,255,0.08);
  transform:translateY(-2px);
  box-shadow:0 0 20px rgba(0,229,255,0.15);
}
.recent-item .rn{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.recent-item .rp{font-size:10px;color:var(--muted)}
#topSearch{display:none}
.top.has-search #topSearch{display:flex;align-items:center;gap:8px;flex:1;max-width:460px}
.top.has-search #topTitle{font-size:14px;letter-spacing:1.5px}

.glass{
  background:rgba(12,12,28,0.82);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(0,229,255,0.08);
  border-radius:14px;padding:20px;margin-bottom:14px;
  box-shadow:0 4px 24px rgba(0,0,0,0.3);
}
.glass h3{
  font-size:11px;text-transform:uppercase;letter-spacing:2.5px;
  color:var(--muted);margin-bottom:12px;font-weight:700;
}
.clickable{cursor:pointer;transition:all 0.3s}
.clickable:hover{
  transform:translateY(-2px);
  border-color:rgba(0,229,255,0.25);
  box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 24px rgba(0,229,255,0.06);
}

.risk-row{display:flex;align-items:center;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.risk-big{
  font-size:48px;font-weight:900;line-height:1;
  text-shadow:0 0 20px currentColor,0 0 40px currentColor;
}
.L{color:var(--green);text-shadow:0 0 18px rgba(0,255,136,0.4),0 0 36px rgba(0,255,136,0.15)}
.M{color:var(--yellow);text-shadow:0 0 18px rgba(255,204,0,0.4),0 0 36px rgba(255,204,0,0.15)}
.H{color:var(--red);text-shadow:0 0 18px rgba(255,51,102,0.4),0 0 36px rgba(255,51,102,0.15)}
.X{color:#ff0033;text-shadow:0 0 20px rgba(255,0,51,0.5),0 0 40px rgba(255,0,51,0.2);animation:pulse 1.5s ease-in-out infinite}

.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:5px;font-size:10px;font-weight:700;letter-spacing:0.5px}
.bg{background:rgba(0,255,136,0.1);color:var(--green);border:1px solid rgba(0,255,136,0.25)}
.by{background:rgba(255,204,0,0.1);color:var(--yellow);border:1px solid rgba(255,204,0,0.25)}
.br{background:rgba(255,51,102,0.1);color:var(--red);border:1px solid rgba(255,51,102,0.25)}
.bc{background:rgba(0,229,255,0.08);color:var(--cyan);border:1px solid rgba(0,229,255,0.2)}
.bp{background:rgba(196,112,255,0.1);color:var(--purple);border:1px solid rgba(196,112,255,0.2)}
.bo{background:rgba(255,122,61,0.1);color:var(--orange);border:1px solid rgba(255,122,61,0.2)}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.met{
  background:rgba(0,229,255,0.03);
  border:1px solid rgba(0,229,255,0.05);
  border-radius:8px;padding:12px;
  transition:all 0.3s;
}
.met:hover{
  border-color:rgba(0,229,255,0.2);
  box-shadow:0 0 12px rgba(0,229,255,0.06);
}
.met .l{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:3px}
.met .v{font-size:17px;font-weight:800}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.card{
  background:rgba(12,12,28,0.8);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(0,229,255,0.06);
  border-radius:12px;padding:18px;
  cursor:pointer;transition:all 0.3s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,229,255,0.04),transparent 50%,rgba(255,38,179,0.02));
  opacity:0;transition:opacity 0.3s;
}
.card:hover{
  transform:translateY(-3px);
  border-color:rgba(0,229,255,0.25);
  box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 24px var(--glow-cyan);
}
.card:hover::before{opacity:1}
.card h4{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px}
.card .val{font-size:22px;font-weight:800;margin-bottom:3px}
.card .sub{font-size:11px;color:var(--muted)}
.card.cl{border-left:3px solid var(--green);box-shadow:inset 3px 0 12px rgba(0,255,136,0.08)}
.card.cy{border-left:3px solid var(--yellow);box-shadow:inset 3px 0 12px rgba(255,204,0,0.08)}
.card.cr{border-left:3px solid var(--red);box-shadow:inset 3px 0 12px rgba(255,51,102,0.08)}
.card.cc{border-left:3px solid var(--cyan);box-shadow:inset 3px 0 12px rgba(0,229,255,0.08)}

.chart-box{
  background:rgba(12,12,28,0.8);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(0,229,255,0.08);
  border-radius:14px;padding:20px;margin-bottom:14px;
}
.chart-box h3{
  font-size:11px;text-transform:uppercase;letter-spacing:2px;
  color:var(--muted);margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;
}
.chart-canvas{width:100%;height:200px;display:block;border-radius:6px}

.stat-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;border-bottom:1px solid rgba(0,229,255,0.04)}
.stat-row:last-child{border-bottom:none}
.sl{color:var(--muted)}.sv{font-weight:600}
.g{color:var(--green);text-shadow:0 0 8px rgba(0,255,136,0.3)}
.r{color:var(--red);text-shadow:0 0 8px rgba(255,51,102,0.3)}
.y{color:var(--yellow);text-shadow:0 0 8px rgba(255,204,0,0.3)}
.b{color:var(--blue);text-shadow:0 0 8px rgba(77,171,255,0.3)}

.mono{font-family:'SF Mono','JetBrains Mono',monospace;color:var(--cyan);font-size:11px}
.table{width:100%;font-size:12px;border-collapse:collapse}
.table th{
  text-align:left;color:var(--muted);text-transform:uppercase;
  letter-spacing:1.5px;padding:8px 10px;font-size:10px;
  border-bottom:1px solid rgba(0,229,255,0.1);font-weight:700;
}
.table td{padding:6px 10px;border-bottom:1px solid rgba(0,229,255,0.03)}
.table tr:hover{background:rgba(0,229,255,0.03)}

.viz-wrap{position:relative;border-radius:10px;overflow:hidden}
.viz-canvas{width:100%;height:400px}
.viz-tip{
  position:absolute;
  background:rgba(8,8,24,0.96);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid rgba(0,229,255,0.2);
  border-radius:8px;padding:10px 14px;font-size:11px;
  pointer-events:none;display:none;z-index:10;max-width:260px;
  box-shadow:0 4px 20px rgba(0,0,0,0.5);
}

.loading{text-align:center;padding:60px 20px;color:var(--muted)}
.spinner{
  display:inline-block;width:24px;height:24px;
  border:2px solid rgba(0,229,255,0.1);
  border-top-color:var(--cyan);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  box-shadow:0 0 12px rgba(0,229,255,0.3);
}
@keyframes spin{to{transform:rotate(360deg)}}
.error{
  background:rgba(255,51,102,0.08);
  border:1px solid rgba(255,51,102,0.25);
  color:var(--red);padding:14px;border-radius:10px;font-size:13px;
}
.link{color:var(--cyan);text-decoration:none;font-size:11px;transition:all 0.2s}
.link:hover{text-decoration:underline;text-shadow:0 0 8px rgba(0,229,255,0.3)}

.ticker{
  background:rgba(8,8,24,0.7);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,229,255,0.1);
  overflow:hidden;height:34px;position:relative;
  box-shadow:0 2px 16px rgba(0,229,255,0.04);
}
.ticker-inner{
  display:flex;gap:28px;
  animation:ticker-scroll 35s linear infinite;
  white-space:nowrap;padding:8px 0;width:max-content;
}
.ticker-item{
  font-size:11px;color:var(--text);
  display:inline-flex;align-items:center;gap:7px;
  cursor:pointer;transition:all 0.3s;
}
.ticker-item:hover{color:var(--cyan);text-shadow:0 0 10px rgba(0,229,255,0.4)}
.ticker-item .s{font-weight:600;color:var(--cyan);text-shadow:0 0 8px rgba(0,229,255,0.3)}
.ticker-item .c{font-weight:700}
.ticker-item .c.up{color:var(--green)}
.ticker-item .c.down{color:var(--red)}
.ticker-item .m{color:var(--muted);font-size:10px}

@keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

@media(max-width:700px){
  .top{padding:10px 14px}
  .content{padding:12px 14px 40px}
  .risk-big{font-size:32px}
  .cards{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="top" id="topBar">
  <h1 id="topTitle">DECIPHER</h1>
  <span id="topSearch">
    <input type="text" id="tokenInput" placeholder="Enter Solana token address..." style="flex:1;" />
    <button class="btn-cyan" id="analyzeBtnTop" onclick="analyze()">ANALYZE</button>
  </span>
  <button class="btn-sm" id="sniperBtn" onclick="scanSnipers()" style="display:none">SNIPERS</button>
  <button class="btn-sm" onclick="window.location.href='/setup'" style="margin-left:auto" title="API Settings">SETTINGS</button>
  <span id="tokenName" style="font-size:13px;color:var(--muted);display:none;"></span>
</div>

<div class="ticker" id="ticker" style="display:none">
  <div class="ticker-inner" id="tickerInner"></div>
</div>

<div class="content empty" id="content">
  <h2>DECIPHER</h2>
  <p>Paste a Solana token address below. Instantly see holder concentration, wallet clusters, bundle detection, liquidity locks, developer history, social media red flags, whale monitoring, and a comprehensive risk score.</p>
  <div class="hero-search">
    <input type="text" id="heroInput" placeholder="Enter Solana CA..." />
    <button class="btn-cyan" id="heroAnalyzeBtn" onclick="analyzeFromHero()">ANALYZE</button>
  </div>
  <div class="recent-section" id="recentSection" style="display:none">
    <h3>Recent</h3>
    <div class="recent-list" id="recentList"></div>
  </div>
</div>

<script>
var appData=null,currentToken='',priceInfo=null,priceHistory=[],priceInterval=null;

function getRecents() {
  try { return JSON.parse(localStorage.getItem('decipher_recents') || '[]'); } catch(e) { return []; }
}
function saveRecent(addr, name, symbol, price) {
  var recents = getRecents();
  recents = recents.filter(function(r){ return r.address !== addr; });
  recents.unshift({ address: addr, name: name, symbol: symbol, price: price, time: Date.now() });
  if (recents.length > 10) recents = recents.slice(0, 10);
  try { localStorage.setItem('decipher_recents', JSON.stringify(recents)); } catch(e) {}
  renderRecents();
}
function renderRecents() {
  var recents = getRecents();
  var section = document.getElementById('recentSection');
  var list = document.getElementById('recentList');
  if (!recents.length) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  var html = '';
  for (var i = 0; i < recents.length; i++) {
    var r = recents[i];
    var pStr = r.price > 0 ? '$' + (r.price < 0.01 ? r.price.toFixed(8) : r.price < 1 ? r.price.toFixed(6) : r.price.toFixed(4)) : '';
    html += '<div class="recent-item" onclick="reanalyze(\''+r.address+'\')"><div class="rn">'+r.name+'</div><div class="rp">'+(r.symbol?'$'+r.symbol+' ':'')+pStr+'</div></div>';
  }
  list.innerHTML = html;
}
function reanalyze(addr) {
  document.getElementById('tokenInput').value = addr;
  document.getElementById('heroInput').value = addr;
  analyze();
}

renderRecents();

(async function checkRpc(){
  try {
    var statusResp = await fetch('/api/config/status');
    if (statusResp.ok) {
      var statusData = await statusResp.json();
      if (!statusData.configured) {
        window.location.href = '/setup';
        return;
      }
    }
  } catch(e) {}
})();

(async function loadTicker(){
  try {
    var resp = await fetch('/api/gainers');
    if (!resp.ok) return;
    var gainers = await resp.json();
    if (!gainers.length) return;
    var ticker = document.getElementById('ticker');
    var inner = document.getElementById('tickerInner');
    var items = '';
    for (var i = 0; i < gainers.length; i++) {
      var g = gainers[i];
      var cls = g.priceChange24h >= 0 ? 'up' : 'down';
      var arrow = g.priceChange24h >= 0 ? '+' : '';
      var xLabel = '';
      if (g.priceChange24h >= 10000) xLabel = '100x+';
      else if (g.priceChange24h >= 5000) xLabel = '50x+';
      else if (g.priceChange24h >= 1000) xLabel = '10x+';
      else if (g.priceChange24h >= 500) xLabel = '5x+';
      else xLabel = Math.round(g.priceChange24h/100) + 'x';
      items += '<span class="ticker-item" onclick="analyzeFromTicker(\''+g.address+'\')" title="'+g.name+'"><span class="s">$'+g.symbol+'</span><span class="c '+cls+'">'+arrow+g.priceChange24h.toFixed(0)+'%</span><span class="m">'+xLabel+'</span></span>';
    }
    inner.innerHTML = items + items;
    ticker.style.display = 'block';
  } catch(e) {}
})();

document.getElementById('tokenInput').addEventListener('keydown',function(e){if(e.key==='Enter')analyze();});
document.getElementById('heroInput').addEventListener('keydown',function(e){if(e.key==='Enter')analyzeFromHero();});

function analyzeFromHero(){
  var heroVal = document.getElementById('heroInput').value.trim();
  if(!heroVal) return;
  document.getElementById('tokenInput').value = heroVal;
  analyze();
}

function analyzeFromTicker(addr){
  if(!addr) return;
  document.getElementById('tokenInput').value = addr;
  document.getElementById('heroInput').value = addr;
  analyze();
}

async function analyze(){
  var addr=document.getElementById('tokenInput').value.trim();if(!addr)return;
  currentToken=addr;appData=null;priceInfo=null;priceHistory=[];lastPriceUsd=0;
  if(priceInterval){clearInterval(priceInterval);priceInterval=null;}
  var topBar=document.getElementById('topBar');
  topBar.classList.add('has-search');
  var c=document.getElementById('content');c.className='content';
  c.style.animation='none';c.offsetHeight;c.style.animation='fadeIn 0.3s ease';
  c.innerHTML='<div class="loading"><div class="spinner"></div><br><span style="font-size:14px;">Analyzing</span><br><span class="mono" style="font-size:12px;">'+addr.slice(0,16)+'...</span></div>';
  document.getElementById('analyzeBtnTop').disabled=true;
  document.getElementById('heroAnalyzeBtn').disabled=true;

  try{
    var resp=await fetch('/api/check/'+encodeURIComponent(addr));
    if(!resp.ok){var e=await resp.json().catch(function(){return{error:'Server error: '+resp.status};});throw new Error(e.error||'Request failed');}
    appData=await resp.json();
    document.getElementById('sniperBtn').style.display='inline-block';
    c.style.opacity='0';c.style.transition='opacity 0.15s';
    setTimeout(function(){c.style.opacity='1';render();},100);
  }catch(err){c.innerHTML='<div class="error">'+(err.message||'Network error - check that the server is running')+'</div>';}
  finally{document.getElementById('analyzeBtnTop').disabled=false;document.getElementById('heroAnalyzeBtn').disabled=false;}
}

// PRICE
var priceHistory=[],priceInterval=null,lastPriceUsd=0;

async function loadPriceData(){
  if(!currentToken)return;var el=document.getElementById('priceContent');if(!el)return;
  try{
    var resp=await fetch('/api/price/'+encodeURIComponent(currentToken));
    if(!resp.ok||!resp)throw new Error('');
    var p=await resp.json();
    if(!p||!p.pairAddress){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);">No DEX pair found for this token</div>';return;}

    var link=document.getElementById('dexLink');if(link){link.style.display='inline';link.href=p.url||'#';}
    if(p.tokenName){
      var tn=document.getElementById('tokenName');tn.style.display='inline';tn.textContent=p.tokenName+(p.tokenSymbol?' ($'+p.tokenSymbol+')':'');
      document.getElementById('topTitle').textContent=p.tokenName||'DECIPHER';
      saveRecent(currentToken, p.tokenName, p.tokenSymbol || '', p.priceUsd || 0);
    }

    var cs=p.priceChange24h>=0?'g':'r';
    var arrow=p.priceChange24h>=0?'&#9650;':'&#9660;';
    el.innerHTML=
      '<div style="display:flex;gap:20px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">'+
        '<div style="font-size:26px;font-weight:800;" id="livePrice">$'+p.priceUsd.toFixed(p.priceUsd<0.01?8:p.priceUsd<1?6:4)+'</div>'+
        '<div class="'+cs+'" style="font-size:18px;font-weight:700;" id="liveChange">'+arrow+' '+p.priceChange24h.toFixed(1)+'%</div>'+
        '<div style="font-size:12px;color:var(--muted);">Liq: $'+fmt(p.liquidityUsd)+'</div>'+
        '<div style="font-size:12px;color:var(--muted);">Vol 24h: $'+fmt(p.volume24h)+'</div>'+
        '<div style="font-size:12px;color:var(--muted);">MC: $'+fmt(p.marketCap)+'</div>'+
        '<div style="font-size:12px;"><span class="g">'+p.txns24hBuys+' buys</span> / <span class="r">'+p.txns24hSells+' sells</span></div>'+
      '</div>'+
      '<canvas id="priceChart" class="chart-canvas"></canvas>';

    priceHistory=[];
    var changes=[p.priceChange24h||0,p.priceChange6h||0,p.priceChange1h||0,0];
    var now=Date.now();
    var cur=p.priceUsd;
    var intervals=[86400000,21600000,3600000,0];
    for(var i=0;i<changes.length;i++){
      var t=now-intervals[i];
      if(i===changes.length-1){priceHistory.push({time:now,price:cur});continue;}
      var prev=cur/(1+changes[i]/100);
      priceHistory.push({time:t,price:prev});
      cur=prev;
    }
    priceHistory.sort(function(a,b){return a.time-b.time;});
    lastPriceUsd=p.priceUsd;

    setTimeout(function(){redrawPriceChart();},100);
    startPricePolling();
  }catch(e){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);">Could not load price data</div>';}
}

function startPricePolling(){
  if(priceInterval)clearInterval(priceInterval);
  priceInterval=setInterval(fetchPriceUpdate,30000);
}

async function fetchPriceUpdate(){
  if(!currentToken)return;
  try{
    var resp=await fetch('/api/price/'+encodeURIComponent(currentToken));
    if(!resp.ok)return;
    var p=await resp.json();
    if(!p||!p.priceUsd)return;
    lastPriceUsd=p.priceUsd;

    var lp=document.getElementById('livePrice');
    if(lp)lp.textContent='$'+p.priceUsd.toFixed(p.priceUsd<0.01?8:p.priceUsd<1?6:4);
    var lc=document.getElementById('liveChange');
    if(lc){
      var cs2=p.priceChange24h>=0?'g':'r';
      var arr2=p.priceChange24h>=0?'&#9650;':'&#9660;';
      lc.className=cs2;
      lc.innerHTML=arr2+' '+p.priceChange24h.toFixed(1)+'%';
    }

    var now=Date.now();
    if(priceHistory.length===0||Math.abs(p.priceUsd-priceHistory[priceHistory.length-1].price)>0.00000001){
      priceHistory.push({time:now,price:p.priceUsd});
      if(priceHistory.length>120)priceHistory.shift();
    }
    redrawPriceChart();
  }catch(e){}
}

function redrawPriceChart(){
  var canvas=document.getElementById('priceChart');
  if(!canvas||priceHistory.length<2)return;
  var container=canvas.parentElement;
  var W=container.clientWidth-40;canvas.width=W;canvas.height=220;
  var ctx=canvas.getContext('2d'),H=220;
  var pad={l:8,r:8,t:8,b:20};

  var prices=priceHistory.map(function(d){return d.price;});
  var min=Math.min.apply(null,prices),max=Math.max.apply(null,prices);
  var range=max-min||0.0001;
  if(range<0.00000001)range=0.00000001;
  var cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;

  ctx.clearRect(0,0,W,H);

  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
  for(var gi=0;gi<4;gi++){var gy=pad.t+(ch/3)*gi;ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();}

  ctx.beginPath();ctx.strokeStyle='#89dceb';ctx.lineWidth=2;
  for(var pi=0;pi<prices.length;pi++){
    var px=pad.l+(pi/Math.max(1,prices.length-1))*cw;
    var py=pad.t+ch-((prices[pi]-min)/range)*ch;
    if(pi===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.stroke();

  var grad=ctx.createLinearGradient(0,pad.t,0,H);
  grad.addColorStop(0,'rgba(137,220,235,0.2)');grad.addColorStop(1,'rgba(137,220,235,0)');
  ctx.lineTo(W-pad.r,H-pad.b);ctx.lineTo(pad.l,H-pad.b);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();

  ctx.beginPath();
  var lx=pad.l+(prices.length-1)/Math.max(1,prices.length-1)*cw;
  var ly=pad.t+ch-((prices[prices.length-1]-min)/range)*ch;
  ctx.arc(lx,ly,4,0,Math.PI*2);
  ctx.fillStyle='#89dceb';ctx.fill();
  ctx.strokeStyle='#06060e';ctx.lineWidth=1.5;ctx.stroke();

  ctx.fillStyle='#72768a';ctx.font='9px Inter,sans-serif';
  if(priceHistory.length>1){
    var startTime=new Date(priceHistory[0].time);
    var endTime=new Date(priceHistory[priceHistory.length-1].time);
    var mins=Math.round((endTime-startTime)/60000);
    ctx.fillText(mins>0?mins+'m ago':startTime.toLocaleTimeString(),pad.l,H-5);
    ctx.fillText('Now',W-pad.r-25,H-5);
  }

  ctx.fillStyle='#e2e4f0';ctx.font='bold 10px Inter,sans-serif';
  ctx.fillText('$'+max.toFixed(6),pad.l,pad.t+10);
  ctx.fillText('$'+min.toFixed(6),pad.l,pad.t+ch);

  var isLastHigh=prices[prices.length-1]>=prices[0];
  ctx.fillStyle=isLastHigh?'#a6e3a1':'#f38ba8';
  ctx.font='bold 10px Inter,sans-serif';
  ctx.fillText('LIVE',W-pad.r-30,pad.t+10);
  if(priceHistory.length>1){
    var pctChange=((prices[prices.length-1]-prices[0])/prices[0]*100);
    ctx.fillText(pctChange>=0?'+':''+pctChange.toFixed(2)+'%',W-pad.r-62,pad.t+22);
  }
}

// WHALES
async function loadWhaleData(){
  if(!currentToken)return;var el=document.getElementById('whaleData');if(!el)return;var card=document.getElementById('whaleCard');
  try{
    var resp=await fetch('/api/whales/'+encodeURIComponent(currentToken)+'?threshold=1');
    if(!resp.ok)throw new Error('');var w=await resp.json();
    var tf1=w.timeframes["1h"],tf2=w.timeframes["2h"],tf3=w.timeframes["3h"],tfa=w.timeframes["all"];

    var net1=tf1.netAccumulationUsd,ns=net1>=0?'+':'',nc=net1>=0?'g':'r';
    if(card)card.innerHTML=ns+'$'+fmt(Math.abs(net1||0))+' <span style="font-size:11px;" class="'+nc+'">'+ns+'</span>';

    el.innerHTML='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;">'+
      tfRow('1 Hour',tf1)+tfRow('2 Hours',tf2)+tfRow('3 Hours',tf3)+tfRow('All Time',tfa)+
    '</div>';
    if(tf1.enteringDetails&&tf1.enteringDetails.length)el.innerHTML+='<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;">Recent Whale Entries (1h)</div>'+tf1.enteringDetails.slice(0,3).map(function(a){return'<div class="stat-row"><span class="mono">'+a.address.slice(0,20)+'...</span><span class="g">+'+fmt(a.amount)+'</span></div>';}).join('');
    if(tf1.exitingDetails&&tf1.exitingDetails.length)el.innerHTML+='<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:8px 0 4px;">Recent Whale Exits (1h)</div>'+tf1.exitingDetails.slice(0,3).map(function(a){return'<div class="stat-row"><span class="mono">'+a.address.slice(0,20)+'...</span><span class="r">-'+fmt(a.amount)+'</span></div>';}).join('');
  }catch(e){el.innerHTML='<div style="color:var(--muted);">Whale data unavailable</div>';if(card)card.innerHTML='N/A';}
}

function tfRow(label,tf){
  var ns=tf.netAccumulationUsd>=0?'+':'',nc=tf.netAccumulationUsd>=0?'g':'r';
  return'<div style="background:rgba(255,255,255,0.02);border-radius:6px;padding:10px;">'+
    '<div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">'+label+'</div>'+
    '<div style="font-size:13px;font-weight:700;"><span class="g">'+tf.whalesEntering+' in</span> / <span class="r">'+tf.whalesExiting+' out</span></div>'+
    '<div style="font-size:11px;color:var(--muted);margin-top:2px;">Net <span class="'+nc+'">'+ns+'$'+fmt(Math.abs(tf.netAccumulationUsd||0))+'</span></div>'+
    '<div style="font-size:10px;color:var(--muted);">Sell: '+(tf.largestSell?'$'+fmt(tf.largestSell.valueUsd||0):'-')+' &bull; Bots: '+tf.botWallets+'</div>'+
  '</div>';
}

// SNIPERS
async function scanSnipers(){
  if(!currentToken)return;var el=document.getElementById('sniperData');
  el.innerHTML='<div style="padding:8px 0;"><div class="spinner" style="width:14px;height:14px;"></div> Scanning...</div>';
  try{
    var resp=await fetch('/api/sniper/'+encodeURIComponent(currentToken));if(!resp.ok)throw new Error('');var snipers=await resp.json();
    if(snipers.length)el.innerHTML=snipers.slice(0,12).map(function(s){var t=s.timeToBuyMs<1000?s.timeToBuyMs+'ms':(s.timeToBuyMs/1000).toFixed(1)+'s';return'<div class="stat-row"><span class="mono">'+s.address.slice(0,22)+'...</span><span class="r">bought in '+t+'</span><span class="sv">'+p(s.share||0)+'</span></div>';}).join('');
    else el.innerHTML='<div style="color:var(--green);padding:4px 0;">No snipers detected</div>';
  }catch(e){el.innerHTML='<div class="error">Scan failed</div>';}
}

// CLUSTER VIZ
function drawViz(){
  var canvas=document.getElementById('clusterCanvas');if(!canvas)return;
  canvas.width=canvas.parentElement.clientWidth;canvas.height=400;
  var ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  var cl=appData.clusters||[],h=appData.holders||[],cols=['#89b4fa','#a6e3a1','#f9e2af','#f38ba8','#cba6f7','#89dceb'];
  var cm={};for(var i=0;i<cl.length;i++){var ws=Array.from(cl[i].wallets||[]);for(var j=0;j<ws.length;j++)cm[ws[j]]=i;}
  var nodes=[],wh=h.filter(function(x){return!x.isContract&&!x.isDex;}).slice(0,50);
  for(var k=0;k<wh.length;k++){var o=wh[k].owner||'',s=wh[k].share||0,ci=cm[o];nodes.push({id:o,share:s,amount:wh[k].amount||0,cluster:ci!==undefined?ci:-1,x:0,y:0});}
  if(!nodes.length)return;
  var ms=Math.max.apply(null,nodes.map(function(n){return n.share||0;})),cx=W/2,cy=H/2;
  var cp=[];for(var ci=0;ci<cl.length;ci++){var a=(ci/Math.max(1,cl.length))*Math.PI*2,r=Math.min(W,H)*0.26;cp.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r});}
  for(var ni=0;ni<nodes.length;ni++){if(nodes[ni].cluster>=0&&nodes[ni].cluster<cp.length){var p=cp[nodes[ni].cluster];nodes[ni].x=p.x+(Math.cos(ni*2.3)*40)*(0.4+Math.random()*0.6);nodes[ni].y=p.y+(Math.sin(ni*2.3)*40)*(0.4+Math.random()*0.6);}else{var ba=(ni/nodes.length)*Math.PI*2;nodes[ni].x=cx+Math.cos(ba)*Math.min(W,H)*0.28;nodes[ni].y=cy+Math.sin(ba)*Math.min(W,H)*0.28;}}
  for(var ei=0;ei<cl.length;ei++){var cn=nodes.filter(function(n){return n.cluster===ei;});ctx.strokeStyle=cols[ei%6]+'18';for(var e1=0;e1<cn.length;e1++)for(var e2=e1+1;e2<Math.min(cn.length,e1+4);e2++){ctx.beginPath();ctx.moveTo(cn[e1].x,cn[e1].y);ctx.lineTo(cn[e2].x,cn[e2].y);ctx.stroke();}}
  for(var di=0;di<nodes.length;di++){var n=nodes[di],nr=4+(n.share/Math.max(0.01,ms))*22;nr=Math.max(3,Math.min(nr,30));var c=n.cluster>=0?cols[n.cluster%6]:'#72768a';ctx.beginPath();ctx.arc(n.x,n.y,nr,0,Math.PI*2);ctx.fillStyle=c+'22';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=1.5;ctx.stroke();if(nr>9){ctx.fillStyle='#e2e4f0';ctx.font='9px Inter,sans-serif';ctx.textAlign='center';ctx.fillText(p(n.share),n.x,n.y+3);}}
  var tip=document.getElementById('vizTip');canvas.onmousemove=function(e){var r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,found=null;for(var hi=nodes.length-1;hi>=0;hi--){var nd=nodes[hi],ndr=4+(nd.share/Math.max(0.01,ms))*22,dx=mx-nd.x,dy=my-nd.y;if(dx*dx+dy*dy<ndr*ndr+25){found=nd;break;}}if(found){tip.style.display='block';tip.style.left=(mx+12)+'px';tip.style.top=(my-16)+'px';tip.innerHTML='<div style="color:var(--yellow);">'+found.id.slice(0,20)+'...</div><div>'+p(found.share)+' &bull; '+fmt(found.amount)+'</div>';}else tip.style.display='none';};canvas.onmouseleave=function(){tip.style.display='none';};
}
</script>
