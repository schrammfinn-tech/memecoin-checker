<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memecoin Checker</title>
<style>
:root{--bg:#06060e;--card:rgba(16,16,30,0.82);--border:rgba(255,255,255,0.06);--text:#e2e4f0;--muted:#72768a;--green:#a6e3a1;--red:#f38ba8;--yellow:#f9e2af;--blue:#89b4fa;--purple:#cba6f7;--cyan:#89dceb;--orange:#fab387;--glow:rgba(137,220,235,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh;background-image:radial-gradient(ellipse at 30% 20%,rgba(137,220,235,0.04) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(166,227,161,0.03) 0%,transparent 60%)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px}

.top{background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100}
.top h1{font-size:16px;font-weight:800;color:var(--cyan);white-space:nowrap}
.top input{flex:1;max-width:460px;background:rgba(255,255,255,0.04);color:var(--text);border:1px solid var(--border);padding:10px 14px;font-size:13px;border-radius:8px;outline:none;font-family:inherit;transition:all 0.2s}
.top input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--glow)}
.top button{color:#06060e;border:none;padding:10px 20px;font-size:12px;font-weight:700;border-radius:8px;cursor:pointer;font-family:inherit;transition:all 0.2s;white-space:nowrap}
.btn-cyan{background:linear-gradient(135deg,var(--cyan),#6cccd8)}.btn-cyan:hover{box-shadow:0 4px 16px rgba(137,220,235,0.25);transform:translateY(-1px)}
.btn-cyan:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-sm{background:rgba(137,220,235,0.08);color:var(--cyan);border:1px solid rgba(137,220,235,0.2);font-weight:600}
.btn-sm:hover{background:rgba(137,220,235,0.14);border-color:var(--cyan)}

.content{padding:20px 28px 50px;max-width:1160px;margin:0 auto}
.content.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center}
.content.empty h2{font-size:26px;font-weight:800;color:var(--cyan);margin-bottom:8px}
.content.empty p{color:var(--muted);font-size:14px;max-width:440px;line-height:1.6}

.glass{background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px}
.glass h3{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px;font-weight:700}
.clickable{cursor:pointer;transition:all 0.2s}.clickable:hover{transform:translateY(-2px);border-color:rgba(137,220,235,0.2);box-shadow:0 8px 28px rgba(0,0,0,0.3)}

.risk-row{display:flex;align-items:center;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.risk-big{font-size:44px;font-weight:900;line-height:1}
.L{color:var(--green)}.M{color:var(--yellow)}.H{color:var(--red)}.X{color:#ff4444}

.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700}
.bg{background:rgba(166,227,161,0.1);color:var(--green);border:1px solid rgba(166,227,161,0.2)}
.by{background:rgba(249,226,175,0.1);color:var(--yellow);border:1px solid rgba(249,226,175,0.2)}
.br{background:rgba(243,139,168,0.1);color:var(--red);border:1px solid rgba(243,139,168,0.2)}
.bc{background:rgba(137,220,235,0.08);color:var(--cyan);border:1px solid rgba(137,220,235,0.15)}
.bp{background:rgba(203,166,247,0.1);color:var(--purple)}
.bo{background:rgba(250,179,135,0.1);color:var(--orange)}

.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:14px}
.met{background:rgba(255,255,255,0.02);border-radius:8px;padding:12px}
.met .l{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px}
.met .v{font-size:17px;font-weight:800}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.card{background:var(--card);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;transition:all 0.2s}
.card:hover{transform:translateY(-2px);border-color:var(--cyan);box-shadow:0 6px 22px rgba(0,0,0,0.25)}
.card h4{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px}
.card .val{font-size:22px;font-weight:800;margin-bottom:3px}
.card .sub{font-size:11px;color:var(--muted)}
.card.cl{border-left:3px solid var(--green)}.card.cy{border-left:3px solid var(--yellow)}.card.cr{border-left:3px solid var(--red)}.card.cc{border-left:3px solid var(--cyan)}

.chart-box{background:var(--card);backdrop-filter:blur(18px);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:14px}
.chart-box h3{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.chart-canvas{width:100%;height:200px;display:block;border-radius:6px}

.stat-row{display:flex;justify-content:space-between;padding:6px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,0.02)}
.stat-row:last-child{border-bottom:none}
.sl{color:var(--muted)}.sv{font-weight:600}
.g{color:var(--green)}.r{color:var(--red)}.y{color:var(--yellow)}.b{color:var(--blue)}

.mono{font-family:'SF Mono','JetBrains Mono',monospace;color:var(--yellow);font-size:11px}
.table{width:100%;font-size:12px;border-collapse:collapse}
.table th{text-align:left;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 10px;font-size:10px;border-bottom:1px solid var(--border);font-weight:700}
.table td{padding:6px 10px;border-bottom:1px solid rgba(255,255,255,0.02)}.table tr:hover{background:rgba(255,255,255,0.015)}

.viz-wrap{position:relative;border-radius:10px;overflow:hidden}.viz-canvas{width:100%;height:400px}
.viz-tip{position:absolute;background:rgba(16,16,30,0.96);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:11px;pointer-events:none;display:none;z-index:10;max-width:260px}

.loading{text-align:center;padding:60px 20px;color:var(--muted)}.spinner{display:inline-block;width:24px;height:24px;border:3px solid rgba(255,255,255,0.06);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.error{background:rgba(243,139,168,0.08);border:1px solid rgba(243,139,168,0.2);color:var(--red);padding:14px;border-radius:10px;font-size:13px}
.link{color:var(--cyan);text-decoration:none;font-size:11px}.link:hover{text-decoration:underline}
@media(max-width:700px){.top{padding:10px 14px}.content{padding:12px 14px 40px}.risk-big{font-size:30px}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="top">
  <h1>MEMECOIN CHECKER</h1>
  <input type="text" id="tokenInput" placeholder="Enter Solana token address..." />
  <button class="btn-cyan" id="analyzeBtn" onclick="analyze()">ANALYZE</button>
  <button class="btn-sm" id="sniperBtn" onclick="scanSnipers()" style="display:none">SNIPERS</button>
</div>

<div class="content empty" id="content">
  <h2>Memecoin Checker</h2>
  <p>Paste a Solana token address above. Instantly see holder concentration, wallet clusters, bundle detection, liquidity locks, developer history, social media red flags, whale monitoring, and a comprehensive risk score.</p>
</div>

<script>
var appData=null,currentToken='',priceInfo=null;

document.getElementById('tokenInput').addEventListener('keydown',function(e){if(e.key==='Enter')analyze();});

async function analyze(){
  var addr=document.getElementById('tokenInput').value.trim();if(!addr)return;
  currentToken=addr;appData=null;priceInfo=null;
  var c=document.getElementById('content');c.className='content';
  c.innerHTML='<div class="loading"><div class="spinner"></div><br><span style="font-size:13px;">Analyzing token data...</span></div>';
  document.getElementById('analyzeBtn').disabled=true;

  try{
    var resp=await fetch('/api/check/'+encodeURIComponent(addr));
    if(!resp.ok){var e=await resp.json();throw new Error(e.error);}
    appData=await resp.json();
    document.getElementById('sniperBtn').style.display='inline-block';
    render();
  }catch(err){c.innerHTML='<div class="error">'+err.message+'</div>';}
  finally{document.getElementById('analyzeBtn').disabled=false;}
}

function fmt(n){if(!n)return'0';if(n>=1e9)return(n/1e9).toFixed(2)+'B';if(n>=1e6)return(n/1e6).toFixed(2)+'M';if(n>=1e3)return(n/1e3).toFixed(2)+'K';if(n>=1)return n.toFixed(2);return n.toFixed(6);}
function p(v){return(v*100).toFixed(1)+'%';}

function render(){
  var d=appData,sb=d.scoreBreakdown||{},h=d.holders||[];
  var wh=h.filter(function(x){return!x.isContract&&!x.isDex;});
  var lp=d.liquidityLock,dev=d.devProfile,bndl=d.bundleDetection,cl=d.clusters||[],social=d.socialResult;
  var t10=wh.slice(0,10).reduce(function(s,x){return s+(x.share||0);},0);
  var t3=wh.slice(0,3).reduce(function(s,x){return s+(x.share||0);},0);
  var rc=d.overallRisk;var rcl={'CRITICAL':'X','HIGH':'H','MEDIUM':'M','LOW':'L'}[rc]||'M';
  var rbg={'CRITICAL':'br','HIGH':'br','MEDIUM':'by','LOW':'bg'}[rc]||'by';
  var totalRisk=Object.values(sb).reduce(function(s,x){return s+(x||0);},0);

  var html='';

  // RISK HEADER
  html+='<div class="risk-row"><div class="risk-big '+rcl+'">'+rc+'</div><div><span class="badge '+rbg+'">'+rc+' RISK &bull; '+totalRisk+'/100 pts</span><div style="margin-top:6px;font-size:12px;color:var(--muted);">Supply: '+fmt(d.totalSupply||0)+' &bull; Nakamoto: '+(d.scores?.nakamotoCoefficient||0)+' &bull; Gini: '+(d.scores?.giniIndex||0).toFixed(3)+'</div></div></div>';

  // SCORE METRICS
  html+='<div class="metrics">';
  html+=mb('Holders',sb.holderConcentration||0,25,sb.holderConcentration>15?'r':sb.holderConcentration>8?'y':'g');
  html+=mb('Clusters',sb.clusteringScore||0,20,sb.clusteringScore>12?'r':sb.clusteringScore>6?'y':'g');
  html+=mb('Bundles',sb.bundleScore||0,20,sb.bundleScore>12?'r':sb.bundleScore>6?'y':'g');
  html+=mb('Liquidity',sb.liquidityScore||0,15,sb.liquidityScore>10?'r':sb.liquidityScore>5?'y':'g');
  html+=mb('Dev Rep',sb.devReputationScore||0,10,sb.devReputationScore>7?'r':sb.devReputationScore>3?'y':'g');
  html+=mb('Social',sb.socialScore||0,10,sb.socialScore>7?'r':sb.socialScore>3?'y':'g');
  html+=mb('Snipers',sb.sniperScore||0,10,'b');
  html+='</div>';

  // PRICE + CARDS row
  html+='<div class="chart-box"><h3>PRICE CHART <a class="link" id="dexLink" target="_blank" style="display:none;">View on DexScreener &rarr;</a></h3><div id="priceContent"><div style="text-align:center;padding:12px;color:var(--muted);"><div class="spinner" style="width:16px;height:16px;"></div> Loading...</div></div></div>';

  // CARDS
  html+='<div class="cards">';
  if(lp)html+='<div class="card c'+(lp.risk==='SAFE'?'l':lp.risk==='MODERATE'?'y':'r')+'" onclick="document.getElementById(\'sec-lp\').scrollIntoView({behavior:\'smooth\'})"><h4>Liquidity</h4><div class="val '+(lp.risk==='SAFE'?'g':lp.risk==='MODERATE'?'y':'r')+'">'+lp.status+'</div><div class="sub">'+(lp.burnedPercent*100).toFixed(0)+'% burned &bull; Dev LP: '+(lp.deployerHoldsLP?'YES':'No')+'</div></div>';
  if(dev)html+='<div class="card c'+(dev.isKnownRugger?'r':dev.rugRate>0.3?'y':'l')+'" onclick="document.getElementById(\'sec-dev\').scrollIntoView({behavior:\'smooth\'})"><h4>Developer</h4><div class="val '+(dev.isKnownRugger?'r':dev.rugRate>0.3?'y':'g')+'">'+(dev.isKnownRugger?'RUGGER':dev.rugRate>0.3?'Suspicious':'Clean')+'</div><div class="sub">'+dev.totalTokensLaunched+' tokens &bull; '+(dev.rugRate*100).toFixed(0)+'% rug rate</div></div>';
  if(bndl)html+='<div class="card c'+(bndl.isBundled?'r':'l')+'" onclick="document.getElementById(\'sec-bundle\').scrollIntoView({behavior:\'smooth\'})"><h4>Bundles</h4><div class="val '+(bndl.isBundled?'r':'g')+'">'+(bndl.isBundled?'BUNDLED':'Clean')+'</div><div class="sub">'+bndl.bundleGroups.length+' groups &bull; '+p(bndl.totalBundleShare)+'</div></div>';
  html+='<div class="card c'+(t10>0.5?'r':t10>0.3?'y':'l')+'" onclick="document.getElementById(\'sec-holders\').scrollIntoView({behavior:\'smooth\'})"><h4>Holders</h4><div class="val">'+p(t10)+'</div><div class="sub">Top 10 wallets &bull; '+wh.length+' total wallets</div></div>';
  if(cl.length)html+='<div class="card cy" onclick="document.getElementById(\'sec-clusters\').scrollIntoView({behavior:\'smooth\'})"><h4>Clusters</h4><div class="val y">'+cl.length+'</div><div class="sub">Suspicious wallet groups</div></div>';
  if(social)html+='<div class="card c'+(social.redFlags.length>=3?'r':social.redFlags.length>0?'y':'l')+'" onclick="document.getElementById(\'sec-social\').scrollIntoView({behavior:\'smooth\'})"><h4>Social</h4><div class="val '+(social.redFlags.length>=3?'r':social.redFlags.length>0?'y':'g')+'">'+social.redFlags.length+' flags</div><div class="sub">'+(social.twitter?social.twitter.handle:'')+'</div></div>';
  html+='<div class="card cc" onclick="document.getElementById(\'sec-whales\').scrollIntoView({behavior:\'smooth\'})"><h4>Whales</h4><div class="val" style="color:var(--cyan);" id="whaleCard">Loading...</div><div class="sub">Entries, exits, accumulation</div></div>';
  html+='</div>';

  // LIQUIDITY
  html+='<div class="glass" id="sec-lp"><h3>Liquidity Lock</h3>';
  if(lp){
    html+='<div class="stat-row"><span class="sl">Status</span><span class="sv '+(lp.status==='BURNED'?'g':lp.status==='LOCKED'?'y':'r')+'">'+lp.status+'</span></div>';
    html+='<div class="stat-row"><span class="sl">Risk</span><span class="sv '+(lp.risk==='SAFE'?'g':lp.risk==='MODERATE'?'y':'r')+'">'+lp.risk+'</span></div>';
    html+='<div class="stat-row"><span class="sl">Burned</span><span class="sv g">'+p(lp.burnedPercent)+'</span></div>';
    html+='<div class="stat-row"><span class="sl">Top LP Holder</span><span class="sv '+(lp.topLPHolderShare>0.5?'r':'y')+'">'+p(lp.topLPHolderShare)+'</span></div>';
    html+='<div class="stat-row"><span class="sl">Dev Holds LP</span><span class="sv '+(lp.deployerHoldsLP?'r':'g')+'">'+(lp.deployerHoldsLP?'YES - DANGER':'No')+'</span></div>';
    if(lp.status==='NO_LP'||lp.risk==='VERY_HIGH'||lp.risk==='HIGH')html+='<div style="margin-top:8px;padding:10px;background:rgba(243,139,168,0.06);border-radius:6px;color:var(--red);font-size:12px;">'+(lp.status==='NO_LP'?'No liquidity pool detected. Token may not be tradable.':'LP is not locked or burned. Deployer can pull liquidity at any time.')+'</div>';
  }else html+='<div style="color:var(--muted);">No data</div>';
  html+='</div>';

  // DEVELOPER
  html+='<div class="glass" id="sec-dev"><h3>Developer</h3>';
  if(dev){
    html+='<div class="stat-row"><span class="sl">Deployer</span><span class="sv mono">'+dev.deployerAddress.slice(0,24)+'...'+dev.deployerAddress.slice(-6)+'</span></div>';
    html+='<div class="stat-row"><span class="sl">Tokens Launched</span><span class="sv">'+dev.totalTokensLaunched+'</span></div>';
    html+='<div class="stat-row"><span class="sl">Rug Rate</span><span class="sv '+(dev.rugRate>0.5?'r':dev.rugRate>0.2?'y':'g')+'">'+(dev.rugRate*100).toFixed(0)+'%</span></div>';
    html+='<div class="stat-row"><span class="sl">Avg Lifespan</span><span class="sv">'+dev.avgTokenLifespanHours.toFixed(1)+'h</span></div>';
    if(dev.isKnownRugger)html+='<div style="margin-top:8px;padding:10px;background:rgba(255,68,68,0.08);border-radius:6px;color:#ff4444;font-size:12px;">KNOWN RUGGER - '+(dev.rugRate*100).toFixed(0)+'% rug rate on '+dev.totalTokensLaunched+' tokens</div>';
  }else html+='<div style="color:var(--muted);">Could not determine</div>';
  html+='</div>';

  // BUNDLES
  html+='<div class="glass" id="sec-bundle"><h3>Bundle Detection</h3>';
  if(bndl){
    html+='<div class="stat-row"><span class="sl">Bundled</span><span class="sv '+(bndl.isBundled?'r':'g')+'">'+(bndl.isBundled?'YES':'No')+'</span></div>';
    html+='<div class="stat-row"><span class="sl">Confidence</span><span class="sv '+(bndl.confidence==='HIGH'?'r':bndl.confidence==='MEDIUM'?'y':'g')+'">'+bndl.confidence+'</span></div>';
    html+='<div class="stat-row"><span class="sl">Groups</span><span class="sv">'+bndl.bundleGroups.length+'</span></div>';
    html+='<div class="stat-row"><span class="sl">Supply</span><span class="sv '+(bndl.totalBundleShare>0.15?'r':'y')+'">'+p(bndl.totalBundleShare)+'</span></div>';
  }else html+='<div style="color:var(--muted);">No data</div>';
  html+='</div>';

  // WHALES
  html+='<div class="glass" id="sec-whales"><h3>Whale Monitor (last hour, &gt;$500)</h3><div id="whaleData"><div style="color:var(--muted);"><div class="spinner" style="width:14px;height:14px;"></div> Loading...</div></div></div>';

  // CLUSTERS
  html+='<div class="glass" id="sec-clusters"><h3>Wallet Clusters</h3>';
  if(cl.length){
    html+='<div class="viz-wrap"><canvas id="clusterCanvas" class="viz-canvas"></canvas><div class="viz-tip" id="vizTip"></div></div>';
    var cols=['#89b4fa','#a6e3a1','#f9e2af','#f38ba8','#cba6f7','#89dceb'];
    html+=cl.map(function(c,i){return'<div class="stat-row"><span class="sl"><span style="color:'+cols[i%6]+';font-weight:600;">Cluster '+(i+1)+'</span> &bull; '+c.wallets.size+' wallets</span><span class="sv g">'+p(c.totalShare||0)+'</span></div>';}).join('');
  }else html+='<div style="color:var(--muted);">No clusters found</div>';
  html+='</div>';

  // HOLDERS
  html+='<div class="glass" id="sec-holders"><h3>Top Holders <span class="badge bg">'+wh.length+' W</span> <span class="badge br">'+h.filter(function(x){return x.isDex;}).length+' DEX</span> <span class="badge bp">'+h.filter(function(x){return x.isContract&&!x.isDex;}).length+' CON</span></h3>';
  html+='<div style="max-height:450px;overflow-y:auto;"><table class="table"><thead><tr><th>#</th><th>Owner</th><th>Share</th><th>Amount</th></tr></thead><tbody>';
  html+=h.slice(0,50).map(function(x,i){var o=x.owner||'?',a=o.slice(0,16)+'...'+o.slice(-6);return'<tr><td>'+(i+1)+'</td><td class="mono">'+a+(x.knownLabel?' <span style="color:var(--muted);">'+x.knownLabel+'</span>':'')+'</td><td>'+p(x.share||0)+'</td><td>'+fmt(x.amount||0)+'</td></tr>';}).join('');
  html+='</tbody></table></div></div>';

  // SOCIAL
  html+='<div class="glass" id="sec-social"><h3>Social Scanner</h3>';
  if(social){
    if(social.redFlags&&social.redFlags.length)social.redFlags.forEach(function(rf){var s=rf.severity==='HIGH'?'br':rf.severity==='MEDIUM'?'by':'bg';html+='<div class="stat-row"><span class="sl"><span class="badge '+s+'">'+rf.severity+'</span></span><span class="sv">'+rf.description+'</span></div>';});
    if(social.twitter)html+='<div class="stat-row"><span class="sl">Twitter @'+social.twitter.handle+'</span><span class="sv">'+social.twitter.followers.toLocaleString()+' followers &bull; '+(social.twitter.recentEngagement.engagementRate*100).toFixed(2)+'% eng</span></div>';
    if(social.telegram)html+='<div class="stat-row"><span class="sl">Telegram</span><span class="sv">'+social.telegram.members.toLocaleString()+' members &bull; '+social.telegram.online+' online</span></div>';
    if(social.website)html+='<div class="stat-row"><span class="sl">Website</span><span class="sv">'+social.website+'</span></div>';
    if(!social.twitter&&!social.telegram)html+='<div style="color:var(--muted);">No social links found</div>';
  }else html+='<div style="color:var(--muted);">No social data</div>';
  html+='</div>';

  // SNIPERS
  html+='<div class="glass" id="sec-snipers"><h3>Sniper Detection</h3><div id="sniperData"><div style="color:var(--muted);">Click SNIPERS button to scan</div></div></div>';

  document.getElementById('content').innerHTML=html;
  setTimeout(function(){if(cl.length)drawViz();},300);
  loadPriceData();
  loadWhaleData();
}

function mb(label,val,max,color){
  var pc=Math.min(100,Math.max(0,val/max*100));
  return'<div class="met"><div class="l">'+label+'</div><div class="v '+color+'">'+val+'<span style="font-size:11px;color:var(--muted);">/'+max+'</span></div></div>';
}

// PRICE
async function loadPriceData(){
  if(!currentToken)return;var el=document.getElementById('priceContent');if(!el)return;
  try{
    var resp=await fetch('/api/price/'+encodeURIComponent(currentToken));
    if(!resp.ok||!resp)throw new Error('');
    var p=await resp.json();
    if(!p||!p.pairAddress){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);">No DEX pair found for this token</div>';return;}

    var link=document.getElementById('dexLink');if(link){link.style.display='inline';link.href=p.url||'#';}

    var cs=p.priceChange24h>=0?'g':'r';
    var arrow=p.priceChange24h>=0?'&#9650;':'&#9660;';
    el.innerHTML=
      '<div style="display:flex;gap:20px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">'+
        '<div style="font-size:26px;font-weight:800;">$'+p.priceUsd.toFixed(p.priceUsd<0.01?8:p.priceUsd<1?6:4)+'</div>'+
        '<div class="'+cs+'" style="font-size:18px;font-weight:700;">'+arrow+' '+p.priceChange24h.toFixed(1)+'%</div>'+
        '<div style="font-size:12px;color:var(--muted);">Liq: $'+fmt(p.liquidityUsd)+'</div>'+
        '<div style="font-size:12px;color:var(--muted);">Vol 24h: $'+fmt(p.volume24h)+'</div>'+
        '<div style="font-size:12px;color:var(--muted);">MC: $'+fmt(p.marketCap)+'</div>'+
        '<div style="font-size:12px;"><span class="g">'+p.txns24hBuys+' buys</span> / <span class="r">'+p.txns24hSells+' sells</span></div>'+
      '</div>'+
      '<canvas id="priceChart" class="chart-canvas"></canvas>';

    // Draw simple price chart from timeframes
    setTimeout(function(){
      var canvas=document.getElementById('priceChart');if(!canvas)return;
      var W=canvas.parentElement.clientWidth-40;canvas.width=W;canvas.height=200;
      var ctx=canvas.getContext('2d'),H=200;
      var changes=[p.priceChange24h||0,p.priceChange6h||0,p.priceChange1h||0,0];
      var prices=[];var current=p.priceUsd;
      for(var i=changes.length-1;i>=0;i--){
        if(i===changes.length-1){prices.push(current);continue;}
        var prev=current/(1+changes[i]/100);
        prices.unshift(prev);current=prev;
      }
      prices.unshift(prices[0]*(1-changes[0]/200));
      prices.push(p.priceUsd);

      var min=Math.min.apply(null,prices),max=Math.max.apply(null,prices);
      var range=max-min||0.0001;
      var pad={l:8,r:8,t:8,b:16};
      var cw=W-pad.l-pad.r,ch=H-pad.t-pad.b;

      // Grid
      ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;
      for(var gi=0;gi<4;gi++){var gy=pad.t+(ch/3)*gi;ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(W-pad.r,gy);ctx.stroke();}

      // Line
      ctx.beginPath();ctx.strokeStyle='var(--cyan)';ctx.lineWidth=2;
      for(var pi=0;pi<prices.length;pi++){
        var px=pad.l+(pi/(prices.length-1))*cw;
        var py=pad.t+ch-((prices[pi]-min)/range)*ch;
        if(pi===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
      }
      ctx.stroke();

      // Gradient fill
      var grad=ctx.createLinearGradient(0,pad.t,0,H);
      grad.addColorStop(0,'rgba(137,220,235,0.2)');grad.addColorStop(1,'rgba(137,220,235,0)');
      ctx.lineTo(W-pad.r,H-pad.b);ctx.lineTo(pad.l,H-pad.b);ctx.closePath();
      ctx.fillStyle=grad;ctx.fill();

      // Labels
      ctx.fillStyle='var(--muted)';ctx.font='9px Inter,sans-serif';
      ctx.fillText('24h ago',pad.l,H-3);ctx.fillText('Now',W-pad.r-25,H-3);

      // Price labels
      ctx.fillStyle='#e2e4f0';ctx.font='bold 10px Inter,sans-serif';
      ctx.fillText('$'+max.toFixed(p.priceUsd<0.01?8:6),pad.l,pad.t+10);
      ctx.fillText('$'+min.toFixed(p.priceUsd<0.01?8:6),pad.l,pad.t+ch);
    },100);
  }catch(e){el.innerHTML='<div style="text-align:center;padding:20px;color:var(--muted);">Could not load price data</div>';}
}

// WHALES
async function loadWhaleData(){
  if(!currentToken)return;var el=document.getElementById('whaleData');if(!el)return;var card=document.getElementById('whaleCard');
  try{
    var resp=await fetch('/api/whales/'+encodeURIComponent(currentToken)+'?threshold=500&hours=1');
    if(!resp.ok)throw new Error('');var w=await resp.json();
    var ns=w.netAccumulationUsd>=0?'+':'',nc=w.netAccumulationUsd>=0?'g':'r';
    if(card)card.innerHTML=ns+'$'+fmt(Math.abs(w.netAccumulationUsd||0))+' <span style="font-size:11px;" class="'+nc+'">'+ns+'</span>';

    el.innerHTML=
      '<div class="metrics" style="margin-bottom:8px;">'+
        '<div class="met"><div class="l">Entering</div><div class="v g">'+w.whalesEntering+'</div></div>'+
        '<div class="met"><div class="l">Exiting</div><div class="v r">'+w.whalesExiting+'</div></div>'+
        '<div class="met"><div class="l">Net Accum.</div><div class="v '+nc+'">'+ns+'$'+fmt(Math.abs(w.netAccumulationUsd||0))+'</div></div>'+
        '<div class="met"><div class="l">Volume</div><div class="v">$'+fmt(w.totalWhaleVolume||0)+'</div></div>'+
        '<div class="met"><div class="l">Largest Sell</div><div class="v r">'+(w.largestSell?'$'+fmt(w.largestSell.valueUsd||0):'-')+'</div></div>'+
        '<div class="met"><div class="l">Bot Wallets</div><div class="v '+(w.botOwnershipPercent>30?'r':'y')+'">'+w.botWallets+' ('+(w.botOwnershipPercent||0).toFixed(0)+'%)</div></div>'+
      '</div>';
    if(w.enteringDetails&&w.enteringDetails.length)el.innerHTML+='<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;">Recent Entries</div>'+w.enteringDetails.slice(0,3).map(function(a){return'<div class="stat-row"><span class="mono">'+a.address.slice(0,20)+'...</span><span class="g">+'+fmt(a.amount)+'</span></div>';}).join('');
    if(w.exitingDetails&&w.exitingDetails.length)el.innerHTML+='<div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:8px 0 6px;">Recent Exits</div>'+w.exitingDetails.slice(0,3).map(function(a){return'<div class="stat-row"><span class="mono">'+a.address.slice(0,20)+'...</span><span class="r">-'+fmt(a.amount)+'</span></div>';}).join('');
    if(!w.whalesEntering&&!w.whalesExiting)el.innerHTML='<div style="color:var(--muted);">No whale activity in the last hour</div>';
  }catch(e){el.innerHTML='<div style="color:var(--muted);">Whale data unavailable</div>';if(card)card.innerHTML='N/A';}
}

// SNIPERS
async function scanSnipers(){
  if(!currentToken)return;var el=document.getElementById('sniperData');
  el.innerHTML='<div style="padding:8px 0;"><div class="spinner" style="width:14px;height:14px;"></div> Scanning...</div>';
  try{
    var resp=await fetch('/api/sniper/'+encodeURIComponent(currentToken));if(!resp.ok)throw new Error('');var snipers=await resp.json();
    if(snipers.length)el.innerHTML=snipers.slice(0,12).map(function(s){var t=s.timeToBuyMs<1000?s.timeToBuyMs+'ms':(s.timeToBuyMs/1000).toFixed(1)+'s';return'<div class="stat-row"><span class="mono">'+s.address.slice(0,22)+'...</span><span class="r">bought in '+t+'</span><span class="sv">'+p(s.share||0)+'</span></div>';}).join('');
    else el.innerHTML='<div style="color:var(--green);padding:4px 0;">No snipers detected</div>';
  }catch(e){el.innerHTML='<div class="error">Scan failed</div>';}
}

// CLUSTER VIZ
function drawViz(){
  var canvas=document.getElementById('clusterCanvas');if(!canvas)return;
  canvas.width=canvas.parentElement.clientWidth;canvas.height=400;
  var ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  var cl=appData.clusters||[],h=appData.holders||[],cols=['#89b4fa','#a6e3a1','#f9e2af','#f38ba8','#cba6f7','#89dceb'];
  var cm={};for(var i=0;i<cl.length;i++){var ws=Array.from(cl[i].wallets||[]);for(var j=0;j<ws.length;j++)cm[ws[j]]=i;}
  var nodes=[],wh=h.filter(function(x){return!x.isContract&&!x.isDex;}).slice(0,50);
  for(var k=0;k<wh.length;k++){var o=wh[k].owner||'',s=wh[k].share||0,ci=cm[o];nodes.push({id:o,share:s,amount:wh[k].amount||0,cluster:ci!==undefined?ci:-1,x:0,y:0});}
  if(!nodes.length)return;
  var ms=Math.max.apply(null,nodes.map(function(n){return n.share||0;})),cx=W/2,cy=H/2;
  var cp=[];for(var ci=0;ci<cl.length;ci++){var a=(ci/Math.max(1,cl.length))*Math.PI*2,r=Math.min(W,H)*0.26;cp.push({x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r});}
  for(var ni=0;ni<nodes.length;ni++){if(nodes[ni].cluster>=0&&nodes[ni].cluster<cp.length){var p=cp[nodes[ni].cluster];nodes[ni].x=p.x+(Math.cos(ni*2.3)*40)*(0.4+Math.random()*0.6);nodes[ni].y=p.y+(Math.sin(ni*2.3)*40)*(0.4+Math.random()*0.6);}else{var ba=(ni/nodes.length)*Math.PI*2;nodes[ni].x=cx+Math.cos(ba)*Math.min(W,H)*0.28;nodes[ni].y=cy+Math.sin(ba)*Math.min(W,H)*0.28;}}
  for(var ei=0;ei<cl.length;ei++){var cn=nodes.filter(function(n){return n.cluster===ei;});ctx.strokeStyle=cols[ei%6]+'18';for(var e1=0;e1<cn.length;e1++)for(var e2=e1+1;e2<Math.min(cn.length,e1+4);e2++){ctx.beginPath();ctx.moveTo(cn[e1].x,cn[e1].y);ctx.lineTo(cn[e2].x,cn[e2].y);ctx.stroke();}}
  for(var di=0;di<nodes.length;di++){var n=nodes[di],nr=4+(n.share/Math.max(0.01,ms))*22;nr=Math.max(3,Math.min(nr,30));var c=n.cluster>=0?cols[n.cluster%6]:'#72768a';ctx.beginPath();ctx.arc(n.x,n.y,nr,0,Math.PI*2);ctx.fillStyle=c+'22';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=1.5;ctx.stroke();if(nr>9){ctx.fillStyle='#e2e4f0';ctx.font='9px Inter,sans-serif';ctx.textAlign='center';ctx.fillText(p(n.share),n.x,n.y+3);}}
  var tip=document.getElementById('vizTip');canvas.onmousemove=function(e){var r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top,found=null;for(var hi=nodes.length-1;hi>=0;hi--){var nd=nodes[hi],ndr=4+(nd.share/Math.max(0.01,ms))*22,dx=mx-nd.x,dy=my-nd.y;if(dx*dx+dy*dy<ndr*ndr+25){found=nd;break;}}if(found){tip.style.display='block';tip.style.left=(mx+12)+'px';tip.style.top=(my-16)+'px';tip.innerHTML='<div style="color:var(--yellow);">'+found.id.slice(0,20)+'...</div><div>'+p(found.share)+' &bull; '+fmt(found.amount)+'</div>';}else tip.style.display='none';};canvas.onmouseleave=function(){tip.style.display='none';};
}
</script>
