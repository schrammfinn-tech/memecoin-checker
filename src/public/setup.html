<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup - DECIPHER</title>
<style>
:root{--bg:#06060e;--card:rgba(16,16,30,0.82);--border:rgba(255,255,255,0.06);--text:#e2e4f0;--muted:#72768a;--green:#a6e3a1;--red:#f38ba8;--yellow:#f9e2af;--blue:#89b4fa;--cyan:#89dceb;--glow:rgba(137,220,235,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Inter','Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background-image:radial-gradient(ellipse at 30% 20%,rgba(137,220,235,0.04) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(166,227,161,0.03) 0%,transparent 60%)}

.setup-card{background:var(--card);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--border);border-radius:16px;padding:40px;width:520px;max-width:90vw}
.setup-card h1{font-size:22px;font-weight:800;color:var(--cyan);margin-bottom:6px}
.setup-card .sub{color:var(--muted);font-size:13px;margin-bottom:28px;line-height:1.5}

.field{margin-bottom:20px}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;font-weight:700}
.field input{width:100%;background:rgba(255,255,255,0.04);color:var(--text);border:1px solid var(--border);padding:12px 14px;font-size:13px;border-radius:8px;outline:none;font-family:'SF Mono','JetBrains Mono',monospace;transition:all 0.2s}
.field input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--glow)}
.field .hint{font-size:11px;color:var(--muted);margin-top:5px}
.field .hint a{color:var(--cyan);text-decoration:none}
.field .hint a:hover{text-decoration:underline}

.actions{display:flex;gap:10px;margin-top:28px}
.actions button{flex:1;color:#06060e;border:none;padding:12px 20px;font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.btn-primary{background:linear-gradient(135deg,var(--cyan),#6cccd8)}
.btn-primary:hover{box-shadow:0 4px 16px rgba(137,220,235,0.25);transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:rgba(255,255,255,0.04);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:rgba(255,255,255,0.06)}

.error-msg{background:rgba(243,139,168,0.08);border:1px solid rgba(243,139,168,0.2);color:var(--red);padding:12px;border-radius:8px;font-size:12px;margin-bottom:16px;display:none}
.success-msg{background:rgba(166,227,161,0.08);border:1px solid rgba(166,227,161,0.2);color:var(--green);padding:12px;border-radius:8px;font-size:12px;margin-bottom:16px;display:none}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.15);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px}@keyframes spin{to{transform:rotate(360deg)}}
.status-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px}
.status-row.configured{background:rgba(166,227,161,0.06);border:1px solid rgba(166,227,161,0.15);color:var(--green)}
.status-row.not-configured{background:rgba(249,226,175,0.06);border:1px solid rgba(249,226,175,0.15);color:var(--yellow)}
</style>
</head>
<body>
<div class="setup-card">
  <h1>DECIPHER Setup</h1>
  <p class="sub">Enter your Helius API key to use DECIPHER. Get a free key at <a href="https://helius.dev" target="_blank">helius.dev</a> (100K requests/day, no credit card).</p>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>

  <div class="field">
    <label>Helius RPC URL</label>
    <input type="text" id="heliusKey" placeholder="https://mainnet.helius-rpc.com/?api-key=YOUR_KEY" />
    <div class="hint">Sign up at <a href="https://helius.dev" target="_blank">helius.dev</a> to get your free API key.</div>
  </div>

  <div class="status-row" id="statusRow" style="display:none">
    <span id="statusText"></span>
  </div>

  <div class="actions">
    <button class="btn-primary" id="saveBtn" onclick="saveConfig()">Save &amp; Start</button>
    <button class="btn-secondary" onclick="window.location.href='/'">Back to App</button>
  </div>
</div>

<script>
var errorMsg = document.getElementById('errorMsg');
var successMsg = document.getElementById('successMsg');
var statusRow = document.getElementById('statusRow');
var statusText = document.getElementById('statusText');

function fetchWithTimeout(url, ms, opts) {
  ms = ms || 10000;
  var ctrl = new AbortController();
  opts = opts || {};
  opts.signal = ctrl.signal;
  return Promise.race([
    fetch(url, opts),
    new Promise(function(_, reject) {
      setTimeout(function() { ctrl.abort(); reject(new Error('Request timed out')); }, ms);
    })
  ]);
}

document.getElementById('heliusKey').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveConfig();
});

async function loadStatus() {
  try {
    var resp = await fetchWithTimeout('/api/config/status', 8000);
    var data = await resp.json();
    statusRow.style.display = 'flex';
    if (data.configured) {
      statusRow.className = 'status-row configured';
      statusText.textContent = 'API key is configured. Change it below if needed.';
      var btn = document.getElementById('saveBtn');
      btn.textContent = 'Save &amp; Update';
    } else {
      statusRow.className = 'status-row not-configured';
      statusText.textContent = 'No API key configured. Enter your Helius RPC URL to get started.';
    }
  } catch(e) {
    statusRow.style.display = 'none';
  }
}

loadStatus();

async function saveConfig() {
  var key = document.getElementById('heliusKey').value.trim();
  if (!key) {
    errorMsg.style.display = 'block';
    errorMsg.textContent = 'Please enter your Helius RPC URL.';
    return;
  }
  if (!key.startsWith('https://')) {
    errorMsg.style.display = 'block';
    errorMsg.textContent = 'URL must start with https://';
    return;
  }

  errorMsg.style.display = 'none';
  var btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Saving...';

  try {
    var resp = await fetchWithTimeout('/api/config/save', 10000, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ heliusRpcUrl: key })
    });

    if (!resp.ok) {
      var err = await resp.json().catch(function() { return { error: 'Failed to save' }; });
      throw new Error(err.error || 'Failed to save configuration');
    }

    successMsg.style.display = 'block';
    successMsg.textContent = 'Configuration saved. Starting application...';
    btn.innerHTML = 'Starting...';

    setTimeout(function() {
      window.location.href = '/';
    }, 800);
  } catch (e) {
    errorMsg.style.display = 'block';
    errorMsg.textContent = e.message || 'Failed to save configuration.';
    btn.disabled = false;
    btn.innerHTML = 'Save & Start';
  }
}
</script>
</body>
</html>
